steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/${PROJECT_ID}/trello-mcp-server', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/trello-mcp-server']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'trello-mcp-server'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/trello-mcp-server'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'TRELLO_API_KEY=${_TRELLO_API_KEY},TRELLO_API_TOKEN=${_TRELLO_API_TOKEN},MCP_ACCESS_TOKEN=${_MCP_ACCESS_TOKEN},BASE_URL=${_BASE_URL},REDIS_HOST=${_REDIS_HOST},REDIS_PORT=${_REDIS_PORT},REDIS_PASSWORD=${_REDIS_PASSWORD}'

images:
  - 'gcr.io/${PROJECT_ID}/trello-mcp-server'

substitutions:
  _TRELLO_API_KEY: ''
  _TRELLO_API_TOKEN: ''
  _MCP_ACCESS_TOKEN: ''
  _BASE_URL: 'https://trello-mcp-server-690360192847.europe-west1.run.app'
  _REDIS_HOST: ''
  _REDIS_PORT: '6379'
  _REDIS_PASSWORD: ''

options:
  substitutionOption: 'ALLOW_LOOSE'
